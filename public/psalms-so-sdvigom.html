<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Псалтырь — с обратным сдвигом участников</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <h2>
      Календарь чтения Псалтыря — с циклическим обратным сдвигом участников
    </h2>

    <label>
      Количество участников:
      <input id="count" type="number" value="17" min="1" max="20" />
    </label>
    <button onclick="run()" class="btn">Показать</button>

    <div id="out" class="table-card"></div>

    <script>
      const TOTAL_KAFISMAS = 20;
      const DAYS = 40;

      function generate(usersCount) {
        let users = Array.from(
          { length: usersCount },
          (_, i) => `Чтец ${i + 1}`,
        );
        const calendar = [];
        let kathisma = 1;

        while (calendar.length < DAYS) {
          if (calendar.length > 0) {
            users.unshift(users.pop());
          }
          const day = [];
          let remaining = TOTAL_KAFISMAS - kathisma + 1;

          // Если в конце цикла осталось меньше кафизм, чем участников, распределяем по одному на первых
          let extraCount = 0;
          if (remaining > 0 && remaining < usersCount && calendar.length > 0) {
            extraCount = remaining;
            const prevDay = calendar[calendar.length - 1];
            for (let i = 0; i < extraCount; i++) {
              prevDay[i].list.push(kathisma);
              kathisma++;
              if (kathisma > TOTAL_KAFISMAS) kathisma = 1;
            }
            // Новый цикл начинается с обратного сдвига участников
            users.unshift(users.pop()); // последний пользователь становится первым
            kathisma = 1;
            continue; // текущий день пустой, цикл стартует со следующего дня
          }

          // Распределяем по 1 кафизме на пользователя
          users.forEach((user) => {
            const list = [];
            list.push(kathisma);
            kathisma++;
            if (kathisma > TOTAL_KAFISMAS) kathisma = 1;
            day.push({ user, list });
          });

          calendar.push(day);
        }

        return calendar;
      }

      function run() {
        const count = +document.getElementById('count').value || 1;
        const cal = generate(count);
        const out = document.getElementById('out');

        out.innerHTML = '';

        cal.forEach((day, i) => {
          const div = document.createElement('div');
          div.className = 'day';
          div.innerHTML = `<b>День ${i + 1}</b>`;
          day.forEach((r) => {
            div.innerHTML += `<p>${r.user} — кафизмы ${r.list.join(', ')}</p>`;
          });
          out.appendChild(div);
        });
      }
    </script>
  </body>
</html>
